name: lint-yaml

on:
  pull_request:
  push:
    branches: [dev, main, "release/**"]

permissions:
  contents: read

concurrency:
  group: lint-yaml-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        timeout-minutes: 2

      - name: yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3
        timeout-minutes: 3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length:
                max: 160
                level: warning
              comments:
                min-spaces-from-content: 1
              truthy:
                allowed-values: ['true', 'false', 'on', 'off']
              braces:
                forbid: false
              document-start: disable

      - name: Install actionlint (checksum verified)
        timeout-minutes: 3
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          set -euo pipefail
          BASE="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          curl -fsSL "${BASE}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o actionlint.tar.gz
          curl -fsSL "${BASE}/actionlint_${ACTIONLINT_VERSION}_checksums.txt" -o checksums.txt
          grep "actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" checksums.txt | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint
          ./actionlint --version

      - name: Run actionlint
        timeout-minutes: 2
        run: ./actionlint -color
