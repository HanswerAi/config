name: lint-yaml

on:
  pull_request:
  push:
    branches: [dev, main, "release/**"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Validate YAML
        run: |
          python3 - <<'PY'
          import pathlib, yaml
          for path in pathlib.Path('.').glob('*.yml'):
              list(yaml.safe_load_all(path.read_text()))
              print('OK', path)
          PY
