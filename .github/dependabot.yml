version: 2
updates:
  # The only ecosystem here is GitHub Actions itself (lint-yaml.yml uses
  # actions/checkout, ibiqlik/action-yamllint, and downloads rhysd/actionlint
  # at a pinned version). Group minor + patch bumps into one weekly PR so the
  # config repo doesn't get noisy.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps-actions)"
    labels:
      - dependencies
      - github-actions
    groups:
      gha-minor-and-patch:
        update-types:
          - minor
          - patch
