# =============================================================================
# Integration test profile (served by Spring Cloud Config via Testcontainers).
#
# Mirrors dev Supabase URLs so JwtDecoder boots against real JWKS. JDBC/Redis
# are overridden at runtime by AbstractPostgresSpringBootTest system properties.
# =============================================================================

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # Real dev Supabase issuer so JwtDecoder boots; tokens validated against JWKS.
          issuer-uri: https://ydctjwgkjwhnxbqlzfgy.supabase.co/auth/v1

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  auth:
    jwt-secret: ${JWT_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}

  supabase:
    url: https://ydctjwgkjwhnxbqlzfgy.supabase.co
    anon-key: ${SUPABASE_ANON_KEY}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}

  google:
    oauth:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID}

  deepgram:
    api-key: ${DEEPGRAM_API_KEY}

  llm:
    openai:
      api-key: ${OPENAI_API_KEY}

interviewmate:
  spring-ai:
    openai:
      api-key: ${OPENAI_API_KEY}
